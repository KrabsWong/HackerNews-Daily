# HackerNews Daily - Docker Compose 配置
# 腾讯云轻量服务器部署方案
# 
# 使用方式：
# 1. 复制 .env.example 到 .env 并填写配置
# 2. docker-compose up -d
# 3. 配置 crontab 定时执行

version: '3.8'

services:
  hackernews-daily:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: hackernews-daily
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # 持久化日志
      - ./logs:/var/log/hackernews-daily
      # 如需手动执行，可以挂载配置
      - ./.env:/app/.env:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
