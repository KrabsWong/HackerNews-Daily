# wrangler.toml
name = "hackernews-daily-export"
main = "dist/worker/index.js"
compatibility_date = "2024-12-11"
compatibility_flags = ["nodejs_compat"]

# Enable observability features
observability = { enabled = true }

# Build configuration for Cloudflare Git integration
[build]
command = "npm ci && npm run build:worker"

# Scheduled triggers (cron format)
# Every 10 minutes for incremental processing
# The system will process one batch (6 articles) per trigger
# Total time to process 30 articles: ~50 minutes (5 batches)
[triggers]
crons = ["*/10 * * * *"]

# D1 Database Configuration (REQUIRED)
# You need to create a D1 database and run the migration first:
#   1. wrangler d1 create hackernews-daily-db
#   2. wrangler d1 execute hackernews-daily-db --file=./migrations/0001_create_tables.sql
#   3. Copy the database_id from step 1 and replace <your-database-id> below
[[d1_databases]]
binding = "DB"
database_name = "hackernews-daily-db"
database_id = "7f5311dc-3fe3-40b9-add0-c20b8b58825d"

# Environment Variables
[vars]
# GitHub publishing configuration
TARGET_REPO = "KrabsWong/Hacker-News-Daily"
TARGET_BRANCH = "main"

# Number of articles to process per batch (default: 6)
TASK_BATCH_SIZE = "6"

# Story fetching configuration
HN_STORY_LIMIT = "30"
SUMMARY_MAX_LENGTH = "300"

# Content filtering (set to "true" to enable AI content filtering)
ENABLE_CONTENT_FILTER = "false"

# Cache configuration
CACHE_ENABLED = "false"

# LLM batch processing
LLM_BATCH_SIZE = "15"

# LLM Provider configuration (default: deepseek)
# Options: deepseek, openrouter, zhipu
# LLM_PROVIDER = "deepseek"

# Optional: Override default models (only set if you need a specific model)
# DeepSeek default: deepseek-chat
# LLM_DEEPSEEK_MODEL = "deepseek-chat"
# OpenRouter default: deepseek/deepseek-chat-v3-0324
# LLM_OPENROUTER_MODEL = "deepseek/deepseek-chat-v3-0324"
# Zhipu default: glm-4.5-flash
# LLM_ZHIPU_MODEL = "glm-4.5-flash"

# IMPORTANT: You must set these secrets via Cloudflare Dashboard or wrangler secret put:
#   - GITHUB_TOKEN (GitHub Personal Access Token with repo scope)
#   - LLM_DEEPSEEK_API_KEY or LLM_OPENROUTER_API_KEY (depending on your LLM provider)
#   - CRAWLER_API_URL and CRAWLER_API_TOKEN (if using custom crawler)
#   - LLM_PROVIDER (optional, defaults to "deepseek")
